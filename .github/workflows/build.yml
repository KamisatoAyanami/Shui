name: Build All Platforms

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  # ─── macOS ────────────────────────────────────────────
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: aarch64
            label: Apple Silicon
          - target: x86_64-apple-darwin
            os: macos-13
            arch: x64
            label: Intel Chip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Setup Apple code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Skip if no Apple certificate is configured
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "⚠️  APPLE_CERTIFICATE secret not set — skipping code signing setup"
            exit 0
          fi

          set -e
          CERT_PATH="$RUNNER_TEMP/shui_build_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/shui-signing.keychain-db"
          KEYCHAIN_PASS="shui-ci-keychain-pass"

          # Decode base64 certificate to a temporary p12 file
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          echo "✅ Certificate decoded ($(wc -c < "$CERT_PATH") bytes)"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo "✅ Temporary keychain created"

          # Import the certificate into the temporary keychain
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          echo "✅ Certificate imported into keychain"

          # Allow codesign to access the keychain without GUI prompt
          security set-key-partition-list \
            -S "apple-tool:,apple:,codesign:" \
            -s \
            -k "$KEYCHAIN_PASS" \
            "$KEYCHAIN_PATH"

          # Make it the default keychain for this job
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          echo "✅ Keychain set as default"

          # Verify the identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "✅ Signing identity verified"

      - name: Build Tauri (macOS ${{ matrix.label }})
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shui-macOS-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ─── Windows ──────────────────────────────────────────
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x64
          - target: i686-pc-windows-msvc
            os: windows-latest
            arch: x86
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows ${{ matrix.arch }})
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shui-Windows-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ─── Linux ────────────────────────────────────────────
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Linux ${{ matrix.arch }})
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload deb & AppImage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Shui-Linux-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ─── Summary (always runs) ────────────────────────────
  summary:
    needs: [build-macos, build-windows, build-linux]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build status
        run: |
          echo "| Platform | Arch | Status |"
          echo "|----------|------|--------|"
          for r in "${{ needs.build-macos.result }}" \
                   "${{ needs.build-windows.result }}" \
                   "${{ needs.build-linux.result }}"; do
            echo "| ... | ... | $r |"
          done
