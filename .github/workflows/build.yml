name: Build All Platforms

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  # ─── macOS ────────────────────────────────────────────
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: aarch64
            label: Apple Silicon
          - target: x86_64-apple-darwin
            os: macos-13
            arch: x64
            label: Intel Chip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Configure Tauri updater signing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "⚠️  TAURI_SIGNING_PRIVATE_KEY not set — disabling updater artifacts"
            node -e "
              const fs = require('fs');
              const path = 'src-tauri/tauri.conf.json';
              const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
              conf.bundle.createUpdaterArtifacts = false;
              fs.writeFileSync(path, JSON.stringify(conf, null, 2));
              console.log('✅ createUpdaterArtifacts set to false');
            "
          else
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is configured"
          fi

      - name: Build Tauri (macOS ${{ matrix.label }})
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shui-macOS-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ─── Windows ──────────────────────────────────────────
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x64
          - target: i686-pc-windows-msvc
            os: windows-latest
            arch: x86
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Configure Tauri updater signing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "⚠️  TAURI_SIGNING_PRIVATE_KEY not set — disabling updater artifacts"
            node -e "
              const fs = require('fs');
              const path = 'src-tauri/tauri.conf.json';
              const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
              conf.bundle.createUpdaterArtifacts = false;
              fs.writeFileSync(path, JSON.stringify(conf, null, 2));
              console.log('✅ createUpdaterArtifacts set to false');
            "
          else
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is configured"
          fi

      - name: Build Tauri (Windows ${{ matrix.arch }})
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shui-Windows-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ─── Linux ────────────────────────────────────────────
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install dependencies
        run: npm ci

      - name: Configure Tauri updater signing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "⚠️  TAURI_SIGNING_PRIVATE_KEY not set — disabling updater artifacts"
            node -e "
              const fs = require('fs');
              const path = 'src-tauri/tauri.conf.json';
              const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
              conf.bundle.createUpdaterArtifacts = false;
              fs.writeFileSync(path, JSON.stringify(conf, null, 2));
              console.log('✅ createUpdaterArtifacts set to false');
            "
          else
            echo "✅ TAURI_SIGNING_PRIVATE_KEY is configured"
          fi

      - name: Build Tauri (Linux ${{ matrix.arch }})
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload deb & AppImage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Shui-Linux-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ─── Summary (always runs) ────────────────────────────
  summary:
    needs: [build-macos, build-windows, build-linux]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build status
        run: |
          echo "| Platform | Arch | Status |"
          echo "|----------|------|--------|"
          for r in "${{ needs.build-macos.result }}" \
                   "${{ needs.build-windows.result }}" \
                   "${{ needs.build-linux.result }}"; do
            echo "| ... | ... | $r |"
          done
